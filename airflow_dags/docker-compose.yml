# version: '3.8' (removed version for modern compose compliance)

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/credentials.json
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
  volumes:
    - ../airflow_dags:/opt/airflow/dags
    - ../spark_jobs:/app/spark_jobs
    - ../dwh:/app/dwh
    - ../credentials.json:/opt/airflow/credentials.json
    - ./variables.json:/opt/airflow/variables.json
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
      airflow variables import /opt/airflow/variables.json &&
      airflow connections add google_cloud_default --conn-type google_cloud_platform --conn-extra '{\"key_path\": \"/opt/airflow/credentials.json\", \"project\": \"dwh-midterm-123456\"}' || true &&
      airflow connections add spark_default --conn-type spark --conn-host 'spark://taobao-spark-master' --conn-port 7077 || true
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8090:8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
